name: Deploy frontend to GitHub Pages

# Builds the Vite frontend and publishes it to GitHub Pages.
# The Express backend (server/) is NOT deployed here — Pages serves static
# files only. Point the frontend at your already-deployed backend by setting
# a repository variable named VITE_API_BASE_URL
# (Settings → Secrets and variables → Actions → Variables).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require VITE_API_BASE_URL
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "::error::Repository variable VITE_API_BASE_URL is not set."
            echo "Set it under Settings → Secrets and variables → Actions → Variables"
            echo "to your deployed backend URL, e.g. https://your-backend.example.com"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        env:
          # Baked into the static bundle at build time.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          # Optional: override the base path (e.g. "/" for a custom domain or
          # a <user>.github.io user/org page). Leave unset for project pages.
          VITE_BASE: ${{ vars.VITE_BASE }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
